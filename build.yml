name: Build DANA Reader APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        # Install Android SDK command line tools
        sudo apt-get update -qq
        sudo apt-get install -y wget unzip
        
        # Download SDK tools
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        
        # Set environment
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

    - name: Install Android SDK packages
      run: |
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "platform-tools" \
          > /dev/null 2>&1

    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        # Download dari URL resmi Gradle
        wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
          -O gradle/wrapper/gradle-wrapper.jar
        echo "Gradle wrapper JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

    - name: Beri izin gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

    - name: Cek hasil build
      run: |
        echo "=== Mencari APK ==="
        find . -name "*.apk" 2>/dev/null
        ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "Folder tidak ditemukan"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DANA-Reader-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30
